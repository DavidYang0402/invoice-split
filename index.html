<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>發票記帳 · 掃描分帳</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.js"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root{
    --paper:#FAF7F0;
    --paper-alt:#F1ECE1;
    --ink:#1C1B18;
    --ink-soft:#5C584C;
    --line:#D8D1C0;
    --accent:#C1440E;
    --accent-soft:#F0D9CC;
    --good:#3F6C51;
    --good-soft:#DCE9DF;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--paper-alt);
    font-family:var(--sans);
    color:var(--ink);
    padding:16px;
    -webkit-tap-highlight-color:transparent;
  }
  .app{ max-width:480px; margin:0 auto; }

  header{ padding:8px 4px 20px; }
  header h1{
    font-size:19px; margin:0 0 2px; letter-spacing:.02em; font-weight:700;
  }
  header p{ margin:0; font-size:12.5px; color:var(--ink-soft); }

  .tabs{ display:flex; gap:6px; margin-bottom:16px; }
  .tab{
    flex:1; text-align:center; padding:10px 4px; font-size:13px; font-weight:600;
    border:1px solid var(--line); background:var(--paper); color:var(--ink-soft);
    border-radius:8px; cursor:pointer; user-select:none;
  }
  .tab.active{ background:var(--ink); color:var(--paper); border-color:var(--ink); }

  .panel{ display:none; }
  .panel.active{ display:block; }

  .receipt{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:2px;
    padding:18px 16px 22px;
    position:relative;
    margin-bottom:16px;
  }
  .receipt::after{
    content:"";
    position:absolute; left:0; right:0; bottom:-1px; height:8px;
    background-image: linear-gradient(135deg, var(--paper-alt) 25%, transparent 25%),
                       linear-gradient(225deg, var(--paper-alt) 25%, transparent 25%);
    background-size: 12px 12px;
    background-position: bottom;
  }

  .field-row{ display:flex; gap:8px; margin-bottom:10px; }
  .field{ flex:1; }
  label{ display:block; font-size:11.5px; color:var(--ink-soft); margin-bottom:4px; font-weight:600; }
  input[type=text], input[type=number], input[type=date]{
    width:100%; padding:9px 10px; border:1px solid var(--line); border-radius:6px;
    background:var(--paper-alt); font-family:var(--mono); font-size:14px; color:var(--ink);
  }
  input:focus{ outline:2px solid var(--accent); outline-offset:1px; }

  .video-wrap{
    position:relative; width:100%; aspect-ratio:3/4; background:#111; border-radius:8px; overflow:hidden; margin-bottom:10px;
  }
  video{ width:100%; height:100%; object-fit:cover; display:block; }
  .scan-guide{
    position:absolute; inset:12%; border:2px dashed rgba(255,255,255,.55); border-radius:8px; pointer-events:none;
  }
  .scan-hint{
    position:absolute; bottom:8px; left:0; right:0; text-align:center; color:#fff; font-size:12px;
    background:rgba(0,0,0,.4); padding:4px 0;
  }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:11px 16px; border-radius:7px; border:1px solid transparent;
    font-size:14px; font-weight:600; cursor:pointer; width:100%;
  }
  .btn-primary{ background:var(--accent); color:#fff; }
  .btn-secondary{ background:var(--paper-alt); color:var(--ink); border-color:var(--line); }
  .btn-good{ background:var(--good); color:#fff; }
  .btn-row{ display:flex; gap:8px; margin-top:10px; }
  .btn-row .btn{ width:auto; flex:1; }

  .status{ font-size:12.5px; padding:8px 10px; border-radius:6px; margin-bottom:10px; }
  .status.ok{ background:var(--good-soft); color:var(--good); }
  .status.warn{ background:var(--accent-soft); color:var(--accent); }

  .items-list{ margin-top:4px; }
  .item-row{
    display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px dashed var(--line);
    font-size:13.5px;
  }
  .item-row:last-child{ border-bottom:none; }
  .item-name{ flex:1; font-family:var(--mono); }
  .item-qty{ width:36px; text-align:right; color:var(--ink-soft); font-family:var(--mono); font-size:12.5px; }
  .item-amt{ width:64px; text-align:right; font-family:var(--mono); font-weight:600; }
  .item-del{ color:var(--accent); cursor:pointer; font-size:16px; width:20px; text-align:center; }

  .add-item-row{ display:flex; gap:6px; margin-top:10px; }
  .add-item-row input{ font-size:13px; padding:8px; }
  .add-item-row .nm{ flex:2; }
  .add-item-row .qty{ flex:0.7; }
  .add-item-row .price{ flex:1; }

  .total-line{
    display:flex; justify-content:space-between; margin-top:10px; padding-top:10px;
    border-top:1px solid var(--line); font-weight:700; font-size:15px;
  }
  .total-line .amt{ font-family:var(--mono); }

  .config-box{
    font-size:11.5px; color:var(--ink-soft); background:var(--paper); border:1px dashed var(--line);
    border-radius:6px; padding:8px 10px; margin-bottom:16px;
  }
  .config-box input{ margin-top:6px; font-size:12px; padding:6px 8px; }

  .footer-note{ font-size:11px; color:var(--ink-soft); text-align:center; margin-top:18px; line-height:1.6; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>🧾 發票記帳</h1>
    <p>掃描 / 上傳 / 手動輸入,存到你的 Google Sheet</p>
  </header>

  <div class="config-box">
    後端網址(部署 GAS 網頁應用程式後貼在這裡,只需設定一次;會存在這台裝置的瀏覽器)
    <input type="text" id="gasUrl" placeholder="https://script.google.com/macros/s/xxxx/exec">
    <div style="height:8px"></div>
    LIFF ID(在 LINE Developers Console 建立 LIFF App 後取得,只需設定一次)
    <input type="text" id="liffId" placeholder="2010566863-xxxxxxxx">
    <div id="liffStatus" style="margin-top:6px"></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="scan">📷 相機掃描</div>
    <div class="tab" data-tab="upload">🖼️ 上傳圖片</div>
    <div class="tab" data-tab="manual">✏️ 手動輸入</div>
  </div>

  <!-- 相機掃描 -->
  <div class="panel active" id="panel-scan">
    <div class="video-wrap">
      <video id="video" playsinline muted></video>
      <div class="scan-guide"></div>
      <div class="scan-hint" id="scanHint">對準發票左側 QR Code</div>
    </div>
    <div class="btn-row" id="liffScanRow" style="display:none">
      <button class="btn btn-primary" id="liffScanBtn">用 LINE 掃描器開啟相機</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" id="startCamBtn">改用網頁相機掃描</button>
      <button class="btn btn-secondary" id="stopCamBtn">停止</button>
    </div>
    <canvas id="scanCanvas" style="display:none"></canvas>
  </div>

  <!-- 上傳圖片 -->
  <div class="panel" id="panel-upload">
    <div class="receipt">
      <label>上傳左側 QR Code 照片(必填,取得發票基本資料)</label>
      <input type="file" accept="image/*" id="uploadLeft">
      <div style="height:12px"></div>
      <label>上傳右側 QR Code 照片(選填,品項較多時才有)</label>
      <input type="file" accept="image/*" id="uploadRight">
    </div>
    <canvas id="uploadCanvas" style="display:none"></canvas>
  </div>

  <!-- 手動輸入 -->
  <div class="panel" id="panel-manual">
    <div class="receipt">
      <div class="field-row">
        <div class="field">
          <label>店名</label>
          <input type="text" id="manualSeller" placeholder="例如:全家便利商店">
        </div>
        <div class="field">
          <label>日期</label>
          <input type="date" id="manualDate">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>發票號碼(選填)</label>
          <input type="text" id="manualInvoiceNumber" placeholder="沒有可留空,系統會自動產生暫存編號">
        </div>
      </div>
      <button class="btn btn-secondary" id="manualStartBtn">開始輸入品項</button>
    </div>
  </div>

  <div id="statusBox"></div>

  <!-- 解析/輸入結果 -->
  <div class="receipt" id="resultBox" style="display:none">
    <div class="field-row">
      <div class="field">
        <label>店名</label>
        <input type="text" id="resSeller">
      </div>
      <div class="field">
        <label>日期</label>
        <input type="date" id="resDate">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>發票號碼</label>
        <input type="text" id="resInvoiceNumber" readonly style="color:var(--ink-soft)">
      </div>
      <div class="field">
        <label>總金額</label>
        <input type="number" id="resTotal">
      </div>
    </div>

    <div class="items-list" id="itemsList"></div>

    <div class="add-item-row">
      <input type="text" class="nm" id="newItemName" placeholder="品名">
      <input type="number" class="qty" id="newItemQty" placeholder="數量" value="1">
      <input type="number" class="price" id="newItemPrice" placeholder="金額">
      <button class="btn btn-secondary" style="width:auto;padding:8px 12px" id="addItemBtn">＋</button>
    </div>

    <div class="total-line">
      <span>品項小計</span>
      <span class="amt" id="itemsSubtotal">0</span>
    </div>

    <button class="btn btn-good" id="saveBtn" style="margin-top:14px">儲存這張發票</button>
  </div>

  <div class="footer-note">
    左方 QR Code 解析依財政部《電子發票證明聯二維條碼規格》v1.9<br>
    不同版本 POS 系統可能有細微差異,解析結果請務必核對後再儲存
  </div>
</div>

<script>
// ========== 設定:記住 GAS 網址 ==========
const gasUrlInput = document.getElementById('gasUrl');
gasUrlInput.value = localStorage.getItem('gasUrl') || '';
gasUrlInput.addEventListener('change', () => localStorage.setItem('gasUrl', gasUrlInput.value.trim()));

function getGasUrl(){ return gasUrlInput.value.trim(); }

// ========== LIFF 設定與初始化 ==========
const liffIdInput = document.getElementById('liffId');
liffIdInput.value = localStorage.getItem('liffId') || '';
liffIdInput.addEventListener('change', () => {
  localStorage.setItem('liffId', liffIdInput.value.trim());
  initLiff();
});

async function initLiff() {
  const liffId = liffIdInput.value.trim();
  const statusEl = document.getElementById('liffStatus');
  if (!liffId) { statusEl.textContent = ''; return; }
  try {
    await liff.init({ liffId });
    if (liff.isInClient()) {
      statusEl.innerHTML = '<span style="color:var(--good)">✓ 已在 LINE 內開啟,可使用 LINE 掃描器</span>';
      document.getElementById('liffScanRow').style.display = 'flex';
    } else {
      statusEl.textContent = '（目前是一般瀏覽器開啟,LINE 掃描器僅在 LINE App 內可用)';
    }
  } catch (err) {
    statusEl.innerHTML = '<span style="color:var(--accent)">LIFF 初始化失敗:' + escapeHtml(err.message) + '</span>';
  }
}
window.addEventListener('load', initLiff);

document.getElementById('liffScanBtn').addEventListener('click', async () => {
  try {
    const result = await liff.scanCodeV2();
    if (result && result.value) {
      handleDecodedText(result.value);
    } else {
      showStatus('沒有掃描到內容,請再試一次', 'warn');
    }
  } catch (err) {
    showStatus('LINE 掃描器啟動失敗:' + err.message, 'warn');
  }
});

// ========== Tabs ==========
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab !== 'scan') stopCamera();
  });
});

// ========== 左方 QR Code 解析 ==========
// 規格來源:財政部《電子發票證明聯一維及二維條碼規格說明》v1.9
// 固定 77 碼: 發票號碼(10) + 發票日期(7,民國年) + 隨機碼(4) + 銷售額hex(8) + 總計額hex(8)
//            + 買方統編(8) + 賣方統編(8) + 加密驗證資訊(24)
// 之後以 ":" 分隔: 營業人自用區(10) : 條碼內品目筆數 : 該發票品目總筆數 : 中文編碼參數 : 品名:數量:單價 (重複)
function parseLeftQR(raw) {
  if (!raw || raw.length < 77) throw new Error('左方 QR Code 內容長度不足,可能掃描到錯誤區塊');

  const invoiceNumber = raw.slice(0, 10);
  const dateROC = raw.slice(10, 17);      // 民國年月日 7碼
  const randomCode = raw.slice(17, 21);
  const salesHex = raw.slice(21, 29);
  const totalHex = raw.slice(29, 37);
  const buyerId = raw.slice(37, 45);
  const sellerId = raw.slice(45, 53);
  // const encryptedInfo = raw.slice(53, 77); // 加密驗證用,用不到就不解析

  const rocYear = parseInt(dateROC.slice(0, 3), 10);
  const month = dateROC.slice(3, 5);
  const day = dateROC.slice(5, 7);
  const isoDate = `${rocYear + 1911}-${month}-${day}`;

  const salesAmount = parseInt(salesHex, 16) || 0;
  const totalAmount = parseInt(totalHex, 16) || 0;

  const rest = raw.slice(77); // 從第78碼開始, 以 ":" 起頭
  const parts = rest.split(':').filter((_, i) => i > 0 || rest[0] !== ':'); // 去掉開頭空字串
  const cleanParts = rest.startsWith(':') ? rest.slice(1).split(':') : rest.split(':');

  // cleanParts: [自用區, 條碼品目筆數, 該發票品目總筆數, 中文編碼參數, 品名, 數量, 單價, 品名, 數量, 單價, ...]
  const items = [];
  if (cleanParts.length > 4) {
    for (let i = 4; i + 2 < cleanParts.length + 1 && cleanParts[i] !== undefined; i += 3) {
      const name = cleanParts[i];
      const qty = parseFloat(cleanParts[i + 1]);
      const price = parseFloat(cleanParts[i + 2]);
      if (name === undefined || isNaN(qty) || isNaN(price)) break;
      items.push({ name: name.trim(), quantity: qty, unitPrice: price, amount: Math.round(qty * price * 100) / 100 });
    }
  }

  return {
    invoiceNumber, randomCode, buyerId, sellerId,
    date: isoDate, salesAmount, totalAmount, items
  };
}

// 右方 QR Code:前兩碼固定 "**",之後接續品名:數量:單價 三碼一組
function parseRightQR(raw) {
  if (!raw || !raw.startsWith('**')) throw new Error('右方 QR Code 應以 ** 開頭,請確認掃到的是右側條碼');
  const rest = raw.slice(2).replace(/^:/, '');
  const parts = rest.split(':');
  const items = [];
  for (let i = 0; i + 2 < parts.length + 1 && parts[i] !== undefined; i += 3) {
    const name = parts[i];
    const qty = parseFloat(parts[i + 1]);
    const price = parseFloat(parts[i + 2]);
    if (name === undefined || isNaN(qty) || isNaN(price)) break;
    items.push({ name: name.trim(), quantity: qty, unitPrice: price, amount: Math.round(qty * price * 100) / 100 });
  }
  return items;
}

// ========== 相機掃描 ==========
let stream = null, scanning = false, videoEl, canvasEl, ctx;
let awaitingRight = false; // 是否正在等待掃描右方 QR(補品項)

function initScanEls() {
  videoEl = document.getElementById('video');
  canvasEl = document.getElementById('scanCanvas');
  ctx = canvasEl.getContext('2d', { willReadFrequently: true });
}

async function startCamera() {
  initScanEls();
  if (stream) {
    // 相機已經開著,這次只是要「繼續掃下一個 QR」
    scanning = true;
    requestAnimationFrame(scanLoop);
    return;
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    videoEl.srcObject = stream;
    await videoEl.play();
    scanning = true;
    requestAnimationFrame(scanLoop);
  } catch (err) {
    showStatus('無法開啟相機:' + err.message + '(桌機請改用「上傳圖片」分頁)', 'warn');
  }
}

function stopCamera() {
  scanning = false;
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
}

function scanLoop() {
  if (!scanning) return;
  if (videoEl.readyState === videoEl.HAVE_ENOUGH_DATA) {
    canvasEl.width = videoEl.videoWidth;
    canvasEl.height = videoEl.videoHeight;
    ctx.drawImage(videoEl, 0, 0, canvasEl.width, canvasEl.height);
    const imageData = ctx.getImageData(0, 0, canvasEl.width, canvasEl.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height);
    if (code) {
      handleDecodedText(code.data);
      return; // 解到一個就停,交給使用者確認
    }
  }
  requestAnimationFrame(scanLoop);
}

document.getElementById('startCamBtn').addEventListener('click', startCamera);
document.getElementById('stopCamBtn').addEventListener('click', stopCamera);

function handleDecodedText(text) {
  // 右方 QR Code 固定以 "**" 開頭,不管目前是不是在等右方,只要看到這個開頭就當品項補充處理
  const looksLikeRightQr = text.startsWith('**');

  if (!awaitingRight && !looksLikeRightQr) {
    try {
      const parsed = parseLeftQR(text);
      fillResultFromLeft(parsed);
      showStatus('已讀取左側 QR Code,請核對資料(品項較多可再掃一次右側補上)', 'ok');
      document.getElementById('scanHint').textContent = '若有品項未讀完,可繼續對準右側 QR Code(選填)';
      awaitingRight = true;
    } catch (err) {
      showStatus('解析失敗:' + err.message, 'warn');
    }
  } else {
    try {
      const items = parseRightQR(text);
      appendItems(items);
      showStatus('已補上右側 QR Code 的品項', 'ok');
    } catch (err) {
      showStatus('右側解析失敗,略過:' + err.message, 'warn');
    }
    awaitingRight = false;
    document.getElementById('scanHint').textContent = '對準發票左側 QR Code';
  }
  // 若是網頁相機在跑,掃到一筆後先暫停,交給使用者確認再決定下一步(按按鈕繼續)
  scanning = false;
}

// ========== 上傳圖片解析 ==========
const uploadCanvas = document.getElementById('uploadCanvas');
function decodeImageFile(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      uploadCanvas.width = img.width;
      uploadCanvas.height = img.height;
      const c = uploadCanvas.getContext('2d');
      c.drawImage(img, 0, 0);
      const imageData = c.getImageData(0, 0, img.width, img.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height);
      if (code) resolve(code.data); else reject(new Error('圖片中找不到 QR Code,請確認照片清晰且只包含條碼區域'));
    };
    img.onerror = () => reject(new Error('圖片讀取失敗'));
    img.src = URL.createObjectURL(file);
  });
}

document.getElementById('uploadLeft').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await decodeImageFile(file);
    const parsed = parseLeftQR(text);
    fillResultFromLeft(parsed);
    showStatus('已讀取左側 QR Code,請核對資料', 'ok');
  } catch (err) {
    showStatus(err.message, 'warn');
  }
});

document.getElementById('uploadRight').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await decodeImageFile(file);
    const items = parseRightQR(text);
    appendItems(items);
    showStatus('已補上右側 QR Code 的品項', 'ok');
  } catch (err) {
    showStatus(err.message, 'warn');
  }
});

// ========== 手動輸入 ==========
document.getElementById('manualStartBtn').addEventListener('click', () => {
  const seller = document.getElementById('manualSeller').value.trim();
  const date = document.getElementById('manualDate').value || new Date().toISOString().slice(0, 10);
  let invoiceNumber = document.getElementById('manualInvoiceNumber').value.trim();
  if (!invoiceNumber) invoiceNumber = 'MANUAL-' + Date.now().toString(36).toUpperCase();

  currentResult = {
    invoiceNumber, date, seller, totalAmount: 0, salesAmount: 0, items: [], source: 'Manual'
  };
  renderResult();
  showStatus('請在下方新增品項', 'ok');
});

// ========== 結果區塊渲染 ==========
let currentResult = null;

function fillResultFromLeft(parsed) {
  currentResult = {
    invoiceNumber: parsed.invoiceNumber,
    date: parsed.date,
    seller: '',
    totalAmount: parsed.totalAmount,
    salesAmount: parsed.salesAmount,
    items: parsed.items,
    source: 'QrScan'
  };
  renderResult();
}

function appendItems(items) {
  if (!currentResult) return;
  currentResult.items = currentResult.items.concat(items);
  renderResult();
}

function renderResult() {
  document.getElementById('resultBox').style.display = 'block';
  document.getElementById('resSeller').value = currentResult.seller || '';
  document.getElementById('resDate').value = currentResult.date || '';
  document.getElementById('resInvoiceNumber').value = currentResult.invoiceNumber || '';
  document.getElementById('resTotal').value = currentResult.totalAmount || 0;
  renderItems();
}

function renderItems() {
  const list = document.getElementById('itemsList');
  list.innerHTML = '';
  currentResult.items.forEach((item, idx) => {
    const row = document.createElement('div');
    row.className = 'item-row';
    row.innerHTML = `
      <span class="item-name">${escapeHtml(item.name)}</span>
      <span class="item-qty">x${item.quantity}</span>
      <span class="item-amt">$${item.amount}</span>
      <span class="item-del" data-idx="${idx}">✕</span>
    `;
    list.appendChild(row);
  });
  list.querySelectorAll('.item-del').forEach(el => {
    el.addEventListener('click', () => {
      currentResult.items.splice(Number(el.dataset.idx), 1);
      renderItems();
    });
  });
  const subtotal = currentResult.items.reduce((s, i) => s + Number(i.amount || 0), 0);
  document.getElementById('itemsSubtotal').textContent = '$' + Math.round(subtotal * 100) / 100;
}

document.getElementById('addItemBtn').addEventListener('click', () => {
  if (!currentResult) return;
  const name = document.getElementById('newItemName').value.trim();
  const qty = parseFloat(document.getElementById('newItemQty').value) || 1;
  const price = parseFloat(document.getElementById('newItemPrice').value) || 0;
  if (!name) { showStatus('請輸入品名', 'warn'); return; }
  currentResult.items.push({ name, quantity: qty, unitPrice: price, amount: Math.round(qty * price * 100) / 100 });
  document.getElementById('newItemName').value = '';
  document.getElementById('newItemPrice').value = '';
  renderItems();
});

// resSeller / resDate / resTotal 手動修正時同步回 currentResult
['resSeller', 'resDate', 'resTotal'].forEach(id => {
  document.getElementById(id).addEventListener('change', (e) => {
    if (!currentResult) return;
    if (id === 'resSeller') currentResult.seller = e.target.value;
    if (id === 'resDate') currentResult.date = e.target.value;
    if (id === 'resTotal') currentResult.totalAmount = parseFloat(e.target.value) || 0;
  });
});

// ========== 儲存到 GAS ==========
document.getElementById('saveBtn').addEventListener('click', async () => {
  const url = getGasUrl();
  if (!url) { showStatus('請先在最上方填入後端網址', 'warn'); return; }
  if (!currentResult) { showStatus('沒有可儲存的資料', 'warn'); return; }

  const payload = {
    action: 'saveInvoice',
    invoiceNumber: currentResult.invoiceNumber,
    invoiceDate: currentResult.date,
    totalAmount: currentResult.totalAmount,
    salesAmount: currentResult.salesAmount,
    seller: currentResult.seller,
    source: currentResult.source,
    items: currentResult.items
  };

  showStatus('儲存中...', 'ok');
  try {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' }, // 避免觸發 GAS 的 CORS preflight
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    showStatus('已儲存發票 ' + data.invoiceNumber + '(分帳功能之後接續開發)', 'ok');
  } catch (err) {
    showStatus('儲存失敗:' + err.message, 'warn');
  }
});

function showStatus(msg, type) {
  const box = document.getElementById('statusBox');
  box.innerHTML = `<div class="status ${type}">${escapeHtml(msg)}</div>`;
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
</script>
