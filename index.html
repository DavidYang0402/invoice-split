<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>發票記帳 · 掃描分帳</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="./style.css" >
  </head>
  <body>
    <div class="app">
      <header>
        <h1>🧾 發票記帳</h1>
        <p>掃描 / 上傳 / 手動輸入,存到你的 Google Sheet</p>
      </header>

      <div class="config-box">
        後端網址(部署 GAS
        網頁應用程式後貼在這裡,只需設定一次;會存在這台裝置的瀏覽器)
        <input
          type="text"
          id="gasUrl"
          placeholder="https://script.google.com/macros/s/xxxx/exec"
        />
        <div style="height: 8px"></div>
        LIFF ID(在 LINE Developers Console 建立 LIFF App 後取得,只需設定一次)
        <input type="text" id="liffId" placeholder="2010566863-xxxxxxxx" />
        <div id="liffStatus" style="margin-top: 6px"></div>
      </div>

      <div class="tabs">
        <div class="tab active" data-tab="scan">📷 相機掃描</div>
        <div class="tab" data-tab="upload">🖼️ 上傳圖片</div>
        <div class="tab" data-tab="manual">✏️ 手動輸入</div>
      </div>

      <!-- 相機掃描 -->
      <div class="panel active" id="panel-scan">
        <div class="video-wrap">
          <video id="video" playsinline muted></video>
          <div class="scan-guide"></div>
          <div class="scan-hint" id="scanHint">對準發票左側 QR Code</div>
        </div>
        <div class="btn-row" id="liffScanRow" style="display: none">
          <button class="btn btn-primary" id="liffScanBtn">
            用 LINE 掃描器開啟相機
          </button>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" id="startCamBtn">
            改用網頁相機掃描
          </button>
          <button class="btn btn-secondary" id="stopCamBtn">停止</button>
        </div>
        <canvas id="scanCanvas" style="display: none"></canvas>
      </div>

      <!-- 上傳圖片 -->
      <div class="panel" id="panel-upload">
        <div class="receipt">
          <label>上傳左側 QR Code 照片(必填,取得發票基本資料)</label>
          <input type="file" accept="image/*" id="uploadLeft" />
          <div style="height: 12px"></div>
          <label>上傳右側 QR Code 照片(選填,品項較多時才有)</label>
          <input type="file" accept="image/*" id="uploadRight" />
        </div>
        <canvas id="uploadCanvas" style="display: none"></canvas>
      </div>

      <!-- 手動輸入 -->
      <div class="panel" id="panel-manual">
        <div class="receipt">
          <div class="field-row">
            <div class="field">
              <label>店名</label>
              <input
                type="text"
                id="manualSeller"
                placeholder="例如:全家便利商店"
              />
            </div>
            <div class="field">
              <label>日期</label>
              <input type="date" id="manualDate" />
            </div>
          </div>
          <div class="field-row">
            <div class="field">
              <label>發票號碼(選填)</label>
              <input
                type="text"
                id="manualInvoiceNumber"
                placeholder="沒有可留空,系統會自動產生暫存編號"
              />
            </div>
          </div>
          <button class="btn btn-secondary" id="manualStartBtn">
            開始輸入品項
          </button>
        </div>
      </div>

      <div id="statusBox"></div>
      <details
        id="debugPanel"
        style="margin-bottom: 14px; font-size: 12px; color: var(--ink-soft)"
      >
        <summary style="cursor: pointer; font-weight: 600">
          除錯資訊(掃描原始字串)
        </summary>
        <div
          id="debugContent"
          style="
            margin-top: 8px;
            white-space: pre-wrap;
            word-break: break-all;
            background: var(--paper);
            border: 1px dashed var(--line);
            border-radius: 6px;
            padding: 8px;
            font-family: var(--mono);
          "
        ></div>
      </details>

      <!-- 解析/輸入結果 -->
      <div class="receipt" id="resultBox" style="display: none">
        <div class="field-row">
          <div class="field">
            <label>店名</label>
            <input type="text" id="resSeller" />
          </div>
          <div class="field">
            <label>日期</label>
            <input type="date" id="resDate" />
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>發票號碼</label>
            <input
              type="text"
              id="resInvoiceNumber"
              readonly
              style="color: var(--ink-soft)"
            />
          </div>
          <div class="field">
            <label>總金額</label>
            <input type="number" id="resTotal" />
          </div>
        </div>

        <div class="items-list" id="itemsList"></div>

        <div class="add-item-row">
          <input type="text" class="nm" id="newItemName" placeholder="品名" />
          <input
            type="number"
            class="qty"
            id="newItemQty"
            placeholder="數量"
            value="1"
          />
          <input
            type="number"
            class="price"
            id="newItemPrice"
            placeholder="金額"
          />
          <button
            class="btn btn-secondary"
            style="width: auto; padding: 8px 12px"
            id="addItemBtn"
          >
            ＋
          </button>
        </div>

        <div class="total-line">
          <span>品項小計</span>
          <span class="amt" id="itemsSubtotal">0</span>
        </div>

        <button class="btn btn-good" id="saveBtn" style="margin-top: 14px">
          儲存這張發票
        </button>
      </div>

      <div class="footer-note">
        左方 QR Code 解析依財政部《電子發票證明聯二維條碼規格》v1.9<br />
        不同版本 POS 系統可能有細微差異,解析結果請務必核對後再儲存
      </div>
    </div>
    <script src="./index.js" defer></script>
  </body>
</html>
